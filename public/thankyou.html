<style>

  .sub{margin-bottom:28px}
  .acts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
  .btn{display:inline-flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;padding:15px 26px;border-radius:12px;text-decoration:none;min-height:52px;border:2px solid transparent}

  .ghost{color:var(--ink);border-color:rgba(22,19,15,.2)}.ghost:hover{border-color:var(--orange);color:var(--orange)}
